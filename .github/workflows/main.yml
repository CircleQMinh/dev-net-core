name: Deploy static content to Pages

run-name: Deploy ${{ inputs.deploy_target }} to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Static output to deploy
        required: true
        default: framework
        type: choice
        options:
          - framework
          - spa-rollback
      confirm_deploy:
        description: I confirm this production deployment
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate and deploy selected static output
    if: github.ref == 'refs/heads/main' && inputs.confirm_deploy == true
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test theme bootstrap
        run: npm run test:theme-bootstrap

      - name: Test SEO
        run: npm run test:seo

      - name: Test content route data
        run: npm run test:content-route-data

      - name: Build current SPA
        run: npm run build

      - name: Build framework candidate
        shell: bash
        run: |
          started_at=$SECONDS
          npm run build:framework
          duration=$((SECONDS - started_at))
          echo "Framework build duration: ${duration}s"
          echo "Framework build duration: ${duration}s" >> "$GITHUB_STEP_SUMMARY"
          if (( duration > 60 )); then
            echo "::error::Framework build exceeded the 60-second budget (${duration}s)."
            exit 1
          fi

      - name: Finalize framework candidate
        run: npm run finalize:framework

      - name: Validate framework candidate
        run: npm run validate:framework

      - name: Prepare deploy targets
        shell: bash
        run: |
          mkdir -p rollback-spa
          cp -R dist/. rollback-spa/
          cp dist/index.html rollback-spa/404.html

          if [[ "${{ inputs.deploy_target }}" == "framework" ]]; then
            echo "PAGES_ARTIFACT_PATH=./build-framework/client" >> "$GITHUB_ENV"
          else
            echo "PAGES_ARTIFACT_PATH=./rollback-spa" >> "$GITHUB_ENV"
          fi

          echo "Selected deploy target: ${{ inputs.deploy_target }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload seven-day SPA rollback snapshot
        uses: actions/upload-artifact@v4
        with:
          name: spa-rollback-${{ github.sha }}-${{ github.run_attempt }}
          path: './rollback-spa'
          if-no-files-found: error
          retention-days: 7

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PAGES_ARTIFACT_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
